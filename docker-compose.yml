version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "7860:7860"
    env_file: ./backend/.env
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - clone_data:/tmp/repoaudit_clones
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:7860
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  clone_data: