name: RepoAudit CI
description: Run RepoAudit and publish score

branding:
  icon: shield
  color: blue

inputs:
  api-url:
    description: "Public RepoAudit backend URL"
    required: true
  repo-url:
    description: "Repository URL to audit. Empty uses current repository."
    required: false
    default: ""
  threshold:
    description: "Minimum passing score 0 to 100. Use 0 to disable."
    required: false
    default: "0"
  timeout-seconds:
    description: "Maximum total wait time in seconds."
    required: false
    default: "600"
  poll-interval-seconds:
    description: "Polling interval in seconds."
    required: false
    default: "5"
  request-timeout-seconds:
    description: "Per HTTP request timeout in seconds."
    required: false
    default: "180"
  request-retries:
    description: "Retry count for transient network errors."
    required: false
    default: "4"

outputs:
  score:
    description: Final reproducibility score
    value: ${{ steps.run.outputs.score }}
  audit-id:
    description: RepoAudit audit ID
    value: ${{ steps.run.outputs.audit-id }}
  status:
    description: Final status
    value: ${{ steps.run.outputs.status }}
  report-json:
    description: Full audit report JSON
    value: ${{ steps.run.outputs.report-json }}

runs:
  using: composite
  steps:
    - name: Run RepoAudit Action Script
      id: run
      shell: bash
      env:
        INPUT_API_URL: ${{ inputs.api-url }}
        INPUT_REPO_URL: ${{ inputs.repo-url }}
        INPUT_REQUEST_TIMEOUT_SECONDS: ${{ inputs.request-timeout-seconds }}
        INPUT_REQUEST_RETRIES: ${{ inputs.request-retries }}
        INPUT_THRESHOLD: ${{ inputs.threshold }}
        INPUT_TIMEOUT_SECONDS: ${{ inputs.timeout-seconds }}
        INPUT_POLL_INTERVAL_SECONDS: ${{ inputs.poll-interval-seconds }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_OUTPUT: ${{ github.output }}
        GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
      run: python "${{ github.action_path }}/action/audit.py"