name: Deploy (Render)

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: render-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Trigger Render deploy hook
    runs-on: ubuntu-latest
    steps:
      - name: Validate secret is set
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            echo "Missing required secret: RENDER_DEPLOY_HOOK_URL"
            echo "Add it in GitHub: Settings -> Secrets and variables -> Actions -> New repository secret"
            exit 1
          fi

      - name: Trigger deploy
        run: |
          curl -fsSL -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

